<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<title>Preview — Árvore 3D</title>
<style>
  html, body { margin: 0; height: 100%; background: #12141a; overflow: hidden; font-family: system-ui, sans-serif; }
  #status {
    position: fixed; top: 10px; left: 10px; z-index: 10;
    font: 13px monospace; color: #cfd6e4; background: rgba(0,0,0,.4);
    padding: 6px 10px; border-radius: 4px; white-space: pre;
  }
  #hint {
    position: fixed; bottom: 14px; left: 50%; transform: translateX(-50%);
    color: #cfd6e4; opacity: .7; font-size: 13px; z-index: 10;
  }
  #info-panel {
    position: fixed; top: 0; right: 0; height: 100%; width: min(360px, 90vw);
    background: rgba(18,20,26,.92); color: #f1efe6; box-sizing: border-box;
    padding: 32px 28px; transform: translateX(100%); transition: transform .5s ease;
    border-left: 1px solid rgba(255,255,255,.08); z-index: 20;
  }
  #info-panel.aberto { transform: translateX(0); }
  #info-panel h2 { margin: 0 0 12px; font-weight: 500; letter-spacing: .02em; }
  #info-panel p { line-height: 1.6; color: #cfd6e4; }
  #voltar {
    margin-top: 20px; background: none; border: 1px solid rgba(255,255,255,.3);
    color: #f1efe6; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px;
  }
  #voltar:hover { background: rgba(255,255,255,.08); }
</style>
</head>
<body>
<div id="status">carregando…</div>
<div id="hint">clique na árvore para entrar</div>
<div id="info-panel">
  <h2 id="info-titulo">Aethel</h2>
  <p id="info-corpo">Lore da árvore aparece aqui — placeholder do protótipo, o conteúdo real virá dos JSONs de data/mundo/aethel.</p>
  <button id="voltar">← voltar</button>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
    "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import gsap from 'gsap';

const statusEl = document.getElementById('status');
const hintEl = document.getElementById('hint');
const panelEl = document.getElementById('info-panel');
const voltarBtn = document.getElementById('voltar');
const log = (msg) => { statusEl.textContent = msg; console.log('[preview]', msg); };

const params = new URLSearchParams(location.search);
const modelUrl = params.get('model') || '../../assets/3d/arvores/aethel.glb';

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x12141a);
scene.fog = new THREE.Fog(0x12141a, 4, 14);

const HOME_CAM = new THREE.Vector3(1.6, 1.2, 1.8);
const HOME_TARGET = new THREE.Vector3(0, 0.6, 0);

const camera = new THREE.PerspectiveCamera(45, innerWidth / innerHeight, 0.05, 100);
camera.position.copy(HOME_CAM);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(innerWidth, innerHeight);
renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
document.body.appendChild(renderer.domElement);

const controls = new OrbitControls(camera, renderer.domElement);
controls.target.copy(HOME_TARGET);
controls.enableDamping = true;

scene.add(new THREE.AmbientLight(0xffffff, 0.6));
const sun = new THREE.DirectionalLight(0xfff4e0, 1.4);
sun.position.set(2, 3, 1.5);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x9fc6ff, 0.4);
fill.position.set(-2, 1, -1.5);
scene.add(fill);

const grid = new THREE.GridHelper(4, 16, 0x444455, 0x2a2c36);
scene.add(grid);

let domeGlass = null;
let treeRoot = null;
let particles = null;
let estado = 'fora'; // 'fora' | 'animando' | 'dentro'

function criarParticulas(raio) {
  const n = 140;
  const positions = new Float32Array(n * 3);
  const speeds = new Float32Array(n);
  for (let i = 0; i < n; i++) {
    const r = raio * 0.85 * Math.cbrt(Math.random());
    const theta = Math.random() * Math.PI * 2;
    const y = Math.random() * raio * 1.1;
    positions[i * 3] = Math.cos(theta) * r;
    positions[i * 3 + 1] = y;
    positions[i * 3 + 2] = Math.sin(theta) * r;
    speeds[i] = 0.05 + Math.random() * 0.1;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xffffff, size: 0.02, transparent: true, opacity: 0,
    depthWrite: false,
  });
  const pts = new THREE.Points(geo, mat);
  pts.userData.speeds = speeds;
  pts.userData.raio = raio;
  return pts;
}

new GLTFLoader().load(
  modelUrl,
  (gltf) => {
    treeRoot = gltf.scene;
    scene.add(treeRoot);
    domeGlass = treeRoot.getObjectByName('Dome_Glass');
    const meshNames = [];
    treeRoot.traverse((o) => { if (o.isMesh) meshNames.push(o.name); });
    log(`OK: ${modelUrl}\nmeshes: ${meshNames.join(', ')}`);

    if (domeGlass) {
      particles = criarParticulas(domeGlass.geometry.boundingSphere?.radius || 1);
      scene.add(particles);
    }
    window.__debug = { scene, camera, domeGlass, treeRoot };
  },
  undefined,
  (err) => log(`ERRO ao carregar ${modelUrl}:\n${err.message || err}`)
);

function entrarNaArvore() {
  if (estado !== 'fora' || !treeRoot) return;
  estado = 'animando';
  hintEl.style.display = 'none';
  controls.enabled = false;

  const domeCenter = new THREE.Vector3(0, 0.6, 0);
  const closeCam = { x: 0.55, y: 0.75, z: 0.9 };

  gsap.to(camera.position, {
    ...closeCam,
    duration: 1.6,
    ease: 'power2.inOut',
    onUpdate: () => camera.lookAt(domeCenter),
  });
  gsap.to(controls.target, {
    x: domeCenter.x, y: domeCenter.y, z: domeCenter.z,
    duration: 1.6,
    ease: 'power2.inOut',
  });

  if (domeGlass) {
    gsap.to(domeGlass.material, { opacity: 0.55, duration: 1.4, ease: 'power1.in' });
  }
  if (particles) {
    gsap.to(particles.material, { opacity: 0.85, duration: 1.2, delay: 0.3 });
  }

  gsap.delayedCall(1.6, () => {
    estado = 'dentro';
    controls.enabled = true;
    panelEl.classList.add('aberto');
  });
}

function sairDaArvore() {
  if (estado !== 'dentro') return;
  estado = 'animando';
  panelEl.classList.remove('aberto');
  controls.enabled = false;

  gsap.to(camera.position, {
    x: HOME_CAM.x, y: HOME_CAM.y, z: HOME_CAM.z,
    duration: 1.2, ease: 'power2.inOut',
    onUpdate: () => camera.lookAt(controls.target),
  });
  gsap.to(controls.target, {
    x: HOME_TARGET.x, y: HOME_TARGET.y, z: HOME_TARGET.z,
    duration: 1.2, ease: 'power2.inOut',
  });
  if (domeGlass) gsap.to(domeGlass.material, { opacity: 0.28, duration: 1.0 });
  if (particles) gsap.to(particles.material, { opacity: 0, duration: 0.8 });

  gsap.delayedCall(1.2, () => {
    estado = 'fora';
    controls.enabled = true;
    hintEl.style.display = '';
  });
}

voltarBtn.addEventListener('click', sairDaArvore);
addEventListener('keydown', (e) => { if (e.key === 'Escape') sairDaArvore(); });

const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
renderer.domElement.addEventListener('click', (event) => {
  if (estado !== 'fora' || !treeRoot) return;
  pointer.x = (event.clientX / innerWidth) * 2 - 1;
  pointer.y = -(event.clientY / innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const hits = raycaster.intersectObjects(treeRoot.children, true);
  if (hits.length > 0) entrarNaArvore();
});

addEventListener('resize', () => {
  camera.aspect = innerWidth / innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(innerWidth, innerHeight);
});

(function animate(t) {
  requestAnimationFrame(animate);
  controls.update();
  if (particles) {
    const pos = particles.geometry.attributes.position;
    const speeds = particles.userData.speeds;
    const raio = particles.userData.raio;
    for (let i = 0; i < speeds.length; i++) {
      let y = pos.array[i * 3 + 1] + speeds[i] * 0.008;
      if (y > raio * 1.1) y = 0;
      pos.array[i * 3 + 1] = y;
    }
    pos.needsUpdate = true;
  }
  renderer.render(scene, camera);
})();
</script>
</body>
</html>
