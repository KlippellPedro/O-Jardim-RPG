<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mundo — O Jardim RPG</title>
    <link rel="icon" type="image/png" href="../assets/img/icons/favicon-64.png" />

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap"
      rel="stylesheet"
    />

    <!-- Styles -->
    <link rel="stylesheet" href="../styles/core/variables.css" />
    <link rel="stylesheet" href="../styles/core/reset.css" />
    <link rel="stylesheet" href="../styles/core/animations.css" />
    <link rel="stylesheet" href="../styles/mundo/mundo.css" />
    <link rel="stylesheet" href="../styles/plataforma/plataforma.css" />
  </head>
  <body>
    <div class="mundo-bg">
      <canvas id="mundo-tree-canvas"></canvas>
    </div>

    <div class="mundo-page">
      <header class="mundo-header">
        <a class="mundo-back" href="/">‹ O Jardim RPG</a>
        <h1 class="mundo-title">Mundo</h1>
        <button type="button" class="mundo-import-btn" id="mundo-content-status" disabled>Conteúdo da campanha</button>
      </header>

      <main class="mundo-content" id="mundo-content" aria-live="polite"></main>
    </div>

    <div class="mundo-toast" id="mundo-toast" role="status" hidden></div>

    <script type="importmap">
      {
        "imports": {
          "three": "https://unpkg.com/three@0.170.0/build/three.module.js",
          "three/addons/": "https://unpkg.com/three@0.170.0/examples/jsm/",
          "gsap": "https://unpkg.com/gsap@3.12.5/index.js"
        }
      }
    </script>
    <script type="module" src="../src/mundo/mundo.js?v=3"></script>
  </body>
</html>
