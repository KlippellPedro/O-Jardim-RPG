<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>O Jardim RPG</title>
  <link rel="icon" type="image/png" href="assets/img/icons/favicon.png">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="styles/core/variables.css">
  <link rel="stylesheet" href="styles/core/reset.css">
  <link rel="stylesheet" href="styles/core/animations.css">
  <link rel="stylesheet" href="styles/menu/menu.css">
</head>
<body>

  <!-- Fundo atmosférico -->
  <div class="menu-bg">
    <canvas id="stars-canvas"></canvas>
    <canvas id="tree-canvas"></canvas>
  </div>

  <!-- Configurações -->
  <button
    class="menu-settings-btn"
    id="settings-btn"
    type="button"
    aria-haspopup="true"
    aria-expanded="false"
    aria-controls="settings-panel"
    aria-label="Configurações"
  ><span class="menu-settings-icon" aria-hidden="true"><img class="menu-icon-image" data-icon-image src="assets/img/icons/menu/configuracoes.png" alt="" hidden><span data-icon-fallback>⚙</span></span></button>

  <div class="menu-settings-panel" id="settings-panel" role="menu" hidden>
    <div class="settings-item settings-item--wip" role="menuitem" aria-disabled="true">
      <span class="settings-item-label">Perfil do player</span>
      <span class="settings-item-badge">Em breve</span>
    </div>

    <div class="settings-item settings-item--actions" role="group" aria-label="Exportar ou importar ficha">
      <span class="settings-item-label">Ficha (.json)</span>
      <div class="settings-item-actions">
        <button type="button" class="settings-action" id="settings-export">Exportar</button>
        <button type="button" class="settings-action" id="settings-import">Importar</button>
        <input type="file" id="settings-import-input" accept="application/json" hidden>
      </div>
    </div>

    <div class="settings-item settings-item--wip" role="menuitem" aria-disabled="true">
      <span class="settings-item-label">Gerenciar desbloqueios</span>
      <span class="settings-item-badge">Em breve</span>
    </div>
  </div>

  <!-- Layout principal -->
  <main class="menu-layout">

    <!-- Cabeçalho -->
    <header class="menu-header">
      <h1 class="menu-title">O <span class="menu-title-accent">Jardim</span><span class="menu-title-tag">RPG</span></h1>

      <div class="menu-ornament">
        <div class="menu-ornament-line"></div>
        <div class="menu-ornament-diamond"></div>
        <div class="menu-ornament-diamond" style="opacity:0.4; transform:rotate(45deg) scale(0.6)"></div>
        <div class="menu-ornament-diamond"></div>
        <div class="menu-ornament-line"></div>
      </div>
    </header>

    <!-- Navegação -->
    <nav class="menu-nav" role="navigation" aria-label="Módulos do sistema">

      <button
        class="menu-card anim-float-up delay-2"
        data-module="ficha"
        aria-label="Abrir fichas de personagem"
      >
        <div class="menu-card-icon" aria-hidden="true"><img class="menu-icon-image" data-icon-image src="assets/img/icons/menu/ficha.png" alt="" hidden><span data-icon-fallback>⚔</span></div>
        <div class="menu-card-content">
          <div class="menu-card-title">Ficha</div>
          <div class="menu-card-desc">Criar e gerenciar seus personagens</div>
        </div>
        <span class="menu-card-arrow" aria-hidden="true">›</span>
      </button>

      <button
        class="menu-card anim-float-up delay-3"
        data-module="mundo"
        aria-label="Explorar o mundo e o lore"
      >
        <div class="menu-card-icon" aria-hidden="true"><img class="menu-icon-image" data-icon-image src="assets/img/icons/menu/mundo.png" alt="" hidden><span data-icon-fallback>✦</span></div>
        <div class="menu-card-content">
          <div class="menu-card-title">Mundo</div>
          <div class="menu-card-desc">Deidades, fluxos, reinos e etc.</div>
        </div>
        <span class="menu-card-arrow" aria-hidden="true">›</span>
      </button>

      <button
        class="menu-card anim-float-up delay-4"
        data-module="regras"
        aria-label="Consultar as regras do sistema"
      >
        <div class="menu-card-icon" aria-hidden="true"><img class="menu-icon-image" data-icon-image src="assets/img/icons/menu/regras.png" alt="" hidden><span data-icon-fallback>§</span></div>
        <div class="menu-card-content">
          <div class="menu-card-title">Regras</div>
          <div class="menu-card-desc">Mecânicas, atributos e testes</div>
        </div>
        <span class="menu-card-arrow" aria-hidden="true">›</span>
      </button>

      <button
        class="menu-card anim-float-up delay-5"
        data-module="loja"
        aria-label="Ver a loja"
      >
        <div class="menu-card-icon" aria-hidden="true"><img class="menu-icon-image" data-icon-image src="assets/img/icons/menu/loja.png" alt="" hidden><span data-icon-fallback>❖</span></div>
        <div class="menu-card-content">
          <div class="menu-card-title">Loja</div>
          <div class="menu-card-desc">Arsenal, veículos, bestiário e drops</div>
        </div>
        <span class="menu-card-arrow" aria-hidden="true">›</span>
      </button>

    </nav>

  </main>

  <script type="module" src="src/menu/menu.js"></script>
</body>
</html>
